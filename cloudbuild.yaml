# Builds all four container images in one Cloud Build run.
# The flamingo + musicgen images build from their own CUDA Dockerfiles.
substitutions:
  _AR: ""        # e.g. us-central1-docker.pkg.dev/PROJECT_ID/music-genome
  _TAG: "latest"

steps:
  - name: gcr.io/cloud-builders/docker
    id: web
    args: ["build", "-t", "${_AR}/web:${_TAG}", "-f", "Dockerfile", "."]

  - name: gcr.io/cloud-builders/docker
    id: audio
    args: ["build", "-t", "${_AR}/audio:${_TAG}", "-f", "audio-service/Dockerfile", "audio-service"]

  - name: gcr.io/cloud-builders/docker
    id: flamingo
    args: ["build", "-t", "${_AR}/flamingo:${_TAG}", "-f", "audio-service/Dockerfile.flamingo", "audio-service"]

  - name: gcr.io/cloud-builders/docker
    id: musicgen
    args: ["build", "-t", "${_AR}/musicgen:${_TAG}", "-f", "musicgen-service/Dockerfile", "musicgen-service"]

images:
  - "${_AR}/web:${_TAG}"
  - "${_AR}/audio:${_TAG}"
  - "${_AR}/flamingo:${_TAG}"
  - "${_AR}/musicgen:${_TAG}"

options:
  machineType: E2_HIGHCPU_8  # the GPU images pull a large CUDA base + transformers
  diskSizeGb: 200            # two CUDA images (flamingo ~16GB model + musicgen) need room
timeout: 3600s
