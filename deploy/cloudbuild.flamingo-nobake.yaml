# Builds the non-baked flamingo image (model comes from a mounted GCS volume).
# Small + fast vs cloudbuild.flamingo.yaml which bakes the ~16GB model.
substitutions:
  _AR: ""
  _TAG: ""
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "${_AR}/flamingo:${_TAG}",
        "-f",
        "audio-service/Dockerfile.flamingo-nobake",
        "audio-service",
      ]
images:
  - "${_AR}/flamingo:${_TAG}"
options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 60
timeout: 2400s
