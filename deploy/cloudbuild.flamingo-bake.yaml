# Bakes the model into the existing dtype-fixed flamingo image (no pip rebuild).
substitutions:
  _AR: ""
  _BASETAG: ""
  _TAG: ""
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - "build"
      - "-t"
      - "${_AR}/flamingo:${_TAG}"
      - "-f"
      - "audio-service/Dockerfile.flamingo-bake"
      - "--build-arg"
      - "BASE=${_AR}/flamingo:${_BASETAG}"
      - "audio-service"
images:
  - "${_AR}/flamingo:${_TAG}"
options:
  diskSizeGb: 200
  machineType: E2_HIGHCPU_8
timeout: 3600s
