# One-time: download the AF3 model from HF and stage it in same-region GCS (HF
# cache layout) so the flamingo service can read it locally instead of
# re-downloading 16GB from HF on every cold start.
substitutions:
  _BUCKET: ""
steps:
  - name: "python:3.11-slim"
    entrypoint: bash
    args:
      - -ceu
      - |
        pip install --quiet "huggingface_hub[hf_transfer]"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        python -c "import os; from huggingface_hub import snapshot_download; snapshot_download('nvidia/audio-flamingo-3-hf', local_dir='/workspace/af3', token=os.environ.get('HF_TOKEN'))"
        rm -rf /workspace/af3/.cache
        du -sh /workspace/af3 || true
        ls /workspace/af3 | head
    secretEnv: ["HF_TOKEN"]
  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud storage rm -r "gs://${_BUCKET}/**" 2>/dev/null || true
        gcloud storage rsync -r /workspace/af3 gs://${_BUCKET}
        echo "staged flat AF3 model to gs://${_BUCKET}"
availableSecrets:
  secretManager:
    - versionName: projects/project-ac194633-c061-471f-b56/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN
timeout: 2400s
options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 120
