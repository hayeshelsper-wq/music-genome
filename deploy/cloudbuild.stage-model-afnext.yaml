# One-time: stage the Audio Flamingo NEXT captioner into a SUBFOLDER of the
# existing -models bucket (does NOT wipe the AF3 files at the bucket root).
# The flamingo-afnext service mounts the bucket and reads /models/afnext-captioner.
substitutions:
  _BUCKET: ""
  _SUBDIR: "afnext-captioner"
  _MODEL: "nvidia/audio-flamingo-next-captioner-hf"
steps:
  - name: "python:3.11-slim"
    entrypoint: bash
    args:
      - -ceu
      - |
        pip install --quiet "huggingface_hub[hf_transfer]"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        python -c "import os; from huggingface_hub import snapshot_download; snapshot_download('${_MODEL}', local_dir='/workspace/m', token=os.environ.get('HF_TOKEN'))"
        rm -rf /workspace/m/.cache
        du -sh /workspace/m || true
        ls /workspace/m | head
    secretEnv: ["HF_TOKEN"]
  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud storage rsync -r /workspace/m "gs://${_BUCKET}/${_SUBDIR}"
        echo "staged ${_MODEL} to gs://${_BUCKET}/${_SUBDIR}"
availableSecrets:
  secretManager:
    - versionName: projects/project-ac194633-c061-471f-b56/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN
timeout: 2400s
options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 120
